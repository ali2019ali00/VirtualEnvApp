name: Android CI
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip and Setup
      run: |
        unzip -o VirtualEnvApp.zip
        # نقل الملفات للساحة الرئيسية إذا كانت داخل مجلد فرعي
        if [ -d "VirtualEnvApp" ]; then mv VirtualEnvApp/* . ; fi
        # توليد ملفات التشغيل (المحرك)
        gradle wrapper
        chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
