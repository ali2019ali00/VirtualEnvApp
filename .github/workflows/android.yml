name: Android CI
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip and Locate
      run: |
        unzip -o VirtualEnvApp.zip || unzip -o project.zip || true
        # إذا الملفات داخل مجلد، نطلعها للساحة الرئيسية
        find . -maxdepth 2 -name "build.gradle" -exec dirname {} \; | xargs -I {} mv {}/* . || true
        # توليد المحرك
        gradle wrapper
        chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
